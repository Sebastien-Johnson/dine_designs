{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
{% if user.is_authenticated %}
<p>Hi {{ user.username }}!</p>
<p><a href="{% url 'password_change' %}">Password Change</a></p>
<form action="{% url 'logout' %}" method="post">
  {% csrf_token %}
  <button type="submit">Log Out</button>
</form>
{% else %}
<p>You are not logged in</p>
<form method="get">
  <button type="submit", formaction="{% url 'login' %}">Log in</button>
</form>
<form method="get">
  <button type="submit", formaction="{% url 'signup' %}">Signup</button>
</form>
<form method="get">
  <button type="submit", formaction="{% url 'password_reset' %}">Password Reset</button>
</form>
{% endif %}
{% endblock %}
